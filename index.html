<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LedgerPro</title>
    
    <style>
        :root { --bg: #0a0a0f; --surf: #13131a; --bord: #2a2a3a; --acc: #f0c040; --red: #ff4d4d; --grn: #00e676; --ylw: #ffd600; --txt: #e8e8f0; --mut: #8080a0; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--txt); padding-bottom: 30px; font-size: 14px; overflow-x: hidden; touch-action: manipulation; line-height: 1.4; }
        
        /* Navigation & Header */
        .nav { position: sticky; top: 0; z-index: 99; background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--bord); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .nav-tabs { display: flex; gap: 6px; }
        .tab { padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; border:none; background:transparent; color: var(--mut); cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
        .tab.active { background: var(--acc); color: #000; }
        .header-bal { font-size: 13px; font-weight: 900; color: var(--acc); margin-left: 10px; letter-spacing: 0.5px; }

        /* Sections */
        .section { display: none; padding: 12px; min-height: 85vh; animation: fadeIn 0.2s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Cards & Forms */
        .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 14px; padding: 16px; margin-bottom: 12px; position: relative; }
        .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .t-btn { padding: 14px; border-radius: 10px; border: 1px solid var(--bord); background: #1c1c28; color: var(--mut); font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .t-btn.active.r { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 4px 12px rgba(255,77,77,0.3); }
        .t-btn.active.g { background: var(--grn); color: #fff; border-color: var(--grn); box-shadow: 0 4px 12px rgba(0,230,118,0.3); }
        
        input, select { width: 100%; background: #1c1c28; border: 1px solid var(--bord); border-radius: 10px; padding: 14px; color: #fff; margin-bottom: 10px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--acc); }
        input::placeholder { color: #555; }

        .btn-sub { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Transaction Grid */
        .txn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .date-separator { grid-column: span 2; padding: 12px 4px 4px; font-size: 10px; font-weight: 900; color: var(--mut); text-transform: uppercase; letter-spacing: 1px; }
        
        .txn-item { display: flex; flex-direction: column; padding: 10px 12px; border-radius: 10px; background: #1c1c28; border: 1px solid #2a2a3a; min-height: 52px; justify-content: center; transition: background 0.1s; }
        .txn-item:active { background: #252535; transform: scale(0.98); }
        .txn-item.bill { border-left: 3px solid var(--red); }
        .txn-item.pay { border-left: 3px solid var(--grn); }
        
        .txn-header { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
        .txn-name { font-weight: 700; font-size: 11px; text-transform: capitalize; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; color: #fff; }
        .txn-amt { font-size: 11px; font-weight: 900; white-space: nowrap; }
        .txn-rem { font-size: 9px; color: var(--mut); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
        
        /* Row Items */
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; margin-bottom: 6px; cursor: pointer; }
        .row-item:active { background: #1c1c28; }
        .row-name { font-weight: 900; font-size: 13px; text-transform: uppercase; }
        .row-sub { font-size: 10px; color: var(--mut); margin-top: 2px; }
        .row-val { font-family: 'Courier New', monospace; font-weight: 800; font-size: 13px; color: var(--txt); }

        .search-container { position: sticky; top: 60px; background: var(--bg); z-index: 10; padding: 4px 0 10px 0; }
        .books-sub-tabs { display: flex; gap: 16px; margin-bottom: 12px; border-bottom: 1px solid var(--bord); padding: 0 4px 8px; }
        .sub-tab { font-size: 12px; font-weight: 800; color: var(--mut); cursor: pointer; border: none; background: transparent; padding-bottom: 6px; position: relative; }
        .sub-tab.active { color: var(--acc); }
        .sub-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--acc); }

        /* Report Controls in Add Section */
        .report-mini-card { background: #0f0f15; border: 1px solid var(--bord); border-radius: 14px; padding: 16px; margin-top: 20px; position: relative; }
        .report-mini-icon { position: absolute; top: -10px; left: 16px; background: var(--bg); padding: 0 8px; color: var(--acc); }
        .report-mini-header { font-size: 10px; font-weight: 900; color: var(--mut); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .report-mini-btns { display: flex; gap: 8px; }
        .dl-mini-btn { flex: 1; background: var(--surf); border: 1px solid var(--bord); color: var(--txt); padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .dl-mini-btn:active { background: var(--acc); color: #000; }

        /* Modals & Overlays */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(5px); }
        .modal { background: var(--surf); border: 1.5px solid var(--bord); border-radius: 20px; padding: 24px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .autocomplete { position: absolute; background: #1c1c28; border: 1px solid var(--acc); width: 100%; z-index: 100; border-radius: 12px; max-height: 250px; overflow-y: auto; top: 58px; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .auto-item { padding: 14px 16px; border-bottom: 1px solid var(--bord); color: var(--txt); display: flex; justify-content: space-between; align-items: center; }

        .sync-indicator { position: fixed; bottom: 20px; right: 20px; width: 10px; height: 10px; border-radius: 50%; background: #222; z-index: 200; }
        .sync-indicator.syncing { background: var(--acc); box-shadow: 0 0 15px var(--acc); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .remark-toggle { font-size: 11px; color: var(--acc); margin: 4px 0 12px; cursor: pointer; display: inline-block; font-weight: 700; }
    </style>
</head>
<body onclick="closeAllPanes(event)">

<div id="sync-indicator" class="sync-indicator"></div>

<nav class="nav">
    <div style="display:flex; align-items:center;">
        <div style="font-weight:900; font-size: 18px; letter-spacing: -0.5px;">LP<span style="color:var(--acc)">.</span></div>
        <div id="header-total" class="header-bal"></div>
    </div>
    <div class="nav-tabs">
        <button class="tab active" onclick="tab('home',this)">HOME</button>
        <button class="tab" onclick="tab('books',this)">BOOKS</button>
        <button class="tab" onclick="tab('add',this)">CLIENTS</button>
    </div>
</nav>

<div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--acc); color:#000; padding:10px 20px; border-radius:12px; font-size:12px; font-weight:900; z-index:9999; display:none; box-shadow:0 10px 20px rgba(0,0,0,0.4)"></div>

<!-- Edit Entry Modal -->
<div id="modal-edit-txn" class="modal-overlay">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 style="font-size:16px; color:var(--acc); margin-bottom:16px">Edit Entry</h2>
        <input id="editA" type="number" placeholder="Amount" inputmode="decimal">
        <select id="editT">
            <option value="bill">SALE (+)</option>
            <option value="pay">PAYMENT (-)</option>
        </select>
        <input id="editR" placeholder="Remarks">
        <div style="display:flex; gap:10px; margin-top:10px">
            <button class="btn-sub" style="background:var(--bord); color:var(--txt)" onclick="closeModal('modal-edit-txn')">CANCEL</button>
            <button id="save-edit-btn" class="btn-sub" style="background:var(--acc); color:#000">SAVE</button>
        </div>
    </div>
</div>

<!-- Success Modal -->
<div id="modal-success" class="modal-overlay" onclick="closeModal('modal-success')">
    <div class="modal" onclick="event.stopPropagation()">
        <div style="font-size: 40px; margin-bottom: 12px;">✨</div>
        <h2 id="m-name" style="color:var(--acc); font-size:18px; text-transform:uppercase">NAME</h2>
        <p id="m-amt" style="font-size:22px; font-weight:900; margin:12px 0; font-family:monospace">0</p>
        <button class="btn-sub" style="background:var(--acc); color:#000" onclick="closeModal('modal-success')">DONE</button>
    </div>
</div>

<!-- Home Section -->
<div id="sec-home" class="section active">
    <div class="type-toggle">
        <button class="t-btn" id="br" onclick="setT('bill')">SALE (+)</button>
        <button class="t-btn" id="bg" onclick="setT('pay')">PAYMENT (-)</button>
    </div>
    
    <div id="form-card" class="card" style="display:none">
        <div id="cust-bal-preview" style="font-size:11px; margin-bottom:8px; display:none">
            <span style="color:var(--mut)">Current Balance: </span><span id="bal-val" style="color:var(--acc); font-weight:900"></span>
        </div>
        <div style="position:relative;">
            <input id="iN" placeholder="Customer Name" oninput="autoC('iN', 'auto', 'cust')" autocomplete="off">
            <div id="auto" class="autocomplete" style="display:none"></div>
        </div>
        <input id="iA" type="number" placeholder="Amount (₹)" inputmode="decimal">
        <span class="remark-toggle" onclick="toggleRemarks()">+ ADD REMARKS / TAGS</span>
        <input id="iR" placeholder="Remarks (Use # to close)" style="display:none">
        <button id="sBtn" class="btn-sub" onclick="sub()">POST ENTRY</button>
    </div>

    <div id="txn-list-container" class="txn-grid"></div>
</div>

<!-- Books Section -->
<div id="sec-books" class="section">
    <div class="books-sub-tabs">
        <button class="sub-tab active" id="st-list" onclick="setBookSubTab('list')">CITY LIST</button>
        <button class="sub-tab" id="st-shared" onclick="setBookSubTab('shared')">SHARED LOG</button>
    </div>

    <div id="view-city-list">
        <div class="search-container">
            <input id="bookSearch" placeholder="Search Customer..." oninput="handleBookSearch(this.value)">
        </div>
        <div id="cityListView"><div id="bookList"></div></div>
        <div id="customerListView" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center; margin: 4px 0 12px;">
                <h3 id="selectedCityName" style="color:var(--acc); text-transform: uppercase; font-size: 13px; font-weight:900"></h3>
                <button class="tab" style="background:var(--bord); color:var(--txt); padding: 6px 12px" onclick="backToCities()">BACK</button>
            </div>
            <div id="customerList"></div>
        </div>
    </div>

    <div id="view-shared-log" style="display:none">
        <div class="card" style="border-color: var(--acc); border-style: dashed; text-align:center">
            <p style="font-size: 11px; color: var(--mut); margin-bottom: 14px;">Marking as shared appends a # to every client's latest transaction to reset the balance start point.</p>
            <button class="btn-sub" style="background: var(--acc); color: #000;" onclick="markAllAsShared()">MARK ALL AS SHARED</button>
        </div>
        <div id="sharedLogList"></div>
    </div>
</div>

<!-- Clients Section -->
<div id="sec-add" class="section">
    <div class="card">
        <h3 style="color:var(--acc); margin-bottom:12px; font-size:14px; font-weight:900">Add New Client</h3>
        <input id="newCustName" placeholder="Full Name">
        <div style="position:relative">
            <input id="newCustCity" placeholder="City" oninput="autoC('newCustCity', 'autoCity', 'city')">
            <div id="autoCity" class="autocomplete" style="display:none"></div>
        </div>
        <button class="btn-sub" style="background:var(--acc); color:#000;" onclick="handleNewClient()">REGISTER CLIENT</button>
    </div>

    <!-- Mini Report Section in Clients -->
    <div class="report-mini-card">
        <div class="report-mini-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </div>
        <div class="report-mini-header">Report Download</div>
        <div class="report-mini-btns">
            <button class="dl-mini-btn" onclick="generateReport('today')">TODAY</button>
            <button class="dl-mini-btn" onclick="generateReport('yesterday')">YESTERDAY</button>
        </div>
    </div>

    <canvas id="reportCanvas" style="display:none"></canvas>
    
    <div id="clientRegistry" style="margin-top:20px"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHDEi_3-0oaLvlPqM3tJdDcMLCdOvr3DNRdl-DDOcAJu_oCJrLCrukhRycnN6nBcwY/exec";
let db = JSON.parse(localStorage.getItem('lp_ledger_v2') || '{"c":{},"t":[],"o":[]}'), curT = '';
let currentlySyncingId = null;
const SHOP_CODE_MAP = { '1':'K', '2':'A', '3':'N', '4':'P', '5':'U', '6':'R', '7':'C', '8':'I', '9':'T', '0':'Y' };

const getD = (offset = 0) => {
    const d = new Date(new Date().getTime() + (5.5 * 3600000));
    if(offset) d.setDate(d.getDate() + offset);
    return d.toISOString().split('T')[0];
};
const saveL = () => localStorage.setItem('lp_ledger_v2', JSON.stringify(db));
const shopFmt = (n) => String(Math.abs(Math.round(n))).split('').map(d => SHOP_CODE_MAP[d] || d).join('');
const smartFmt = (n) => Math.abs(n) >= 30000 ? shopFmt(n) : '₹' + Number(n).toLocaleString('en-IN');
const fmt = (n) => '₹' + Number(n).toLocaleString('en-IN');

function init() { 
    drawR(); 
    updateS(); 
    syncOutbox(); 
    initPTR(); 
    if(db.t.length === 0) pull();
}

async function syncOutbox() {
    if (db.o.length === 0) { 
        currentlySyncingId = null; 
        document.getElementById('sync-indicator').classList.remove('syncing');
        return; 
    }
    document.getElementById('sync-indicator').classList.add('syncing');
    const task = db.o[0];
    if (task.txn) currentlySyncingId = task.txn.id;
    drawR();
    try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(task) });
        db.o.shift(); 
        saveL(); 
        syncOutbox();
    } catch (e) { 
        currentlySyncingId = null;
        document.getElementById('sync-indicator').classList.remove('syncing'); 
        drawR();
    }
}

async function pull() {
    const indicator = document.getElementById('sync-indicator');
    indicator.classList.add('syncing');
    const c = 'cb'+Date.now();
    window[c] = (d) => { 
        if(d.txns) { 
            db.t = d.txns; 
            db.c = d.customers || {}; 
            saveL(); 
            drawR(); 
            updateS(); 
        } 
        indicator.classList.remove('syncing'); 
    };
    const s = document.createElement('script');
    s.src = `${SCRIPT_URL}?action=getData&callback=${c}`;
    document.body.appendChild(s);
}

function tab(n, b) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('sec-' + n).classList.add('active');
    if(b) b.classList.add('active');
    if(n === 'books') { setBookSubTab('list'); backToCities(); }
    if(n === 'add') drawClientRegistry();
}

function setBookSubTab(t) {
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('st-' + t).classList.add('active');
    document.getElementById('view-city-list').style.display = t === 'list' ? 'block' : 'none';
    document.getElementById('view-shared-log').style.display = t === 'shared' ? 'block' : 'none';
    if(t === 'shared') drawSharedLog();
}

function setT(t) {
    curT = t;
    document.getElementById('br').className = t === 'bill' ? 't-btn active r' : 't-btn';
    document.getElementById('bg').className = t === 'pay' ? 't-btn active g' : 't-btn';
    document.getElementById('form-card').style.display = 'block';
    const s = document.getElementById('sBtn');
    s.style.background = t === 'bill' ? 'var(--red)' : 'var(--grn)';
    s.innerText = t === 'bill' ? 'POST SALE (+)' : 'POST PAYMENT (-)';
}

function autoC(inId, auId, type) {
    const v = document.getElementById(inId).value.toLowerCase(), a = document.getElementById(auId);
    if(!v) { a.style.display='none'; return; }
    let m = [];
    if (type === 'cust') {
        Object.keys(db.c).forEach(n => {
            const city = db.c[n].city || "";
            if (n.toLowerCase().includes(v) || city.toLowerCase().includes(v)) m.push({ name: n, extra: city });
        });
    } else {
        const cities = [...new Set(Object.values(db.c).map(c => c.city))];
        cities.forEach(c => { if (c.toLowerCase().includes(v)) m.push({ name: c, extra: '' }); });
    }
    a.innerHTML = m.map(item => `<div class="auto-item" onclick="sel('${item.name.replace(/'/g,"\\'")}','${inId}','${auId}','${type}')"><span>${item.name}</span>${item.extra ? `<small style="color:var(--mut); font-size:10px">${item.extra}</small>` : ''}</div>`).join('');
    a.style.display = m.length ? 'block' : 'none';
}

function sel(val, inId, auId, type) {
    document.getElementById(inId).value = val;
    document.getElementById(auId).style.display = 'none';
    if (type === 'cust') {
        const bal = db.t.filter(t => t.name.toLowerCase() === val.toLowerCase()).reduce((s, t) => s + (t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0)), 0);
        document.getElementById('bal-val').innerText = shopFmt(bal);
        document.getElementById('cust-bal-preview').style.display = 'block';
    }
}

function toggleRemarks() {
    const r = document.getElementById('iR');
    r.style.display = r.style.display === 'none' ? 'block' : 'none';
}

function getSyncStatus(id) {
    if (currentlySyncingId === id) return 'syncing';
    return db.o.some(o => o.txn && o.txn.id === id) ? 'pending' : 'synced';
}

function drawR() {
    const container = document.getElementById('txn-list-container');
    const recents = [...db.t].filter(t => t.type !== 'join').sort((a,b) => b.id - a.id).slice(0, 60);
    const groups = [];
    let currentGroup = null;
    recents.forEach(t => {
        if (!currentGroup || currentGroup.date !== t.date) { currentGroup = { date: t.date, items: [] }; groups.push(currentGroup); }
        currentGroup.items.push(t);
    });
    
    let html = '';
    groups.forEach((g) => {
        html += `<div class="date-separator">${g.date === getD() ? 'Today' : g.date}</div>`;
        const bills = g.items.filter(it => it.type === 'bill'), pays = g.items.filter(it => it.type === 'pay'), maxLen = Math.max(bills.length, pays.length);
        for (let i = 0; i < maxLen; i++) {
            const bill = bills[i], pay = pays[i];
            html += `<div style="display:contents">`;
            [bill, pay].forEach((item) => {
                if (item) {
                    const status = getSyncStatus(item.id), color = item.type === 'bill' ? 'var(--red)' : 'var(--grn)';
                    html += `<div class="txn-item ${item.type}" onclick="openEditModal(${item.id})"><div class="txn-header"><span class="sync-dot ${status}"></span><span class="txn-name">${item.name}</span><span class="txn-amt" style="color:${color}">${smartFmt(item.amount)}</span></div><span class="txn-rem">${item.remarks || ''}</span></div>`;
                } else { html += `<div></div>`; }
            });
            html += `</div>`;
        }
    });
    container.innerHTML = html || '<div style="grid-column:span 2;text-align:center;padding:40px;color:var(--mut)">No entries today</div>';
}

function openEditModal(id) {
    const tx = db.t.find(t => t.id === id);
    if(!tx) return;
    document.getElementById('editA').value = tx.amount;
    document.getElementById('editT').value = tx.type;
    document.getElementById('editR').value = tx.remarks || '';
    document.getElementById('modal-edit-txn').style.display = 'flex';
    document.getElementById('save-edit-btn').onclick = () => {
        tx.amount = parseFloat(document.getElementById('editA').value);
        tx.type = document.getElementById('editT').value;
        tx.remarks = document.getElementById('editR').value;
        db.o.push({ action: 'editTxn', txn: tx });
        saveL(); drawR(); updateS();
        closeModal('modal-edit-txn'); syncOutbox();
    };
}

async function sub() {
    const n = document.getElementById('iN').value.trim(), a = parseFloat(document.getElementById('iA').value), r = document.getElementById('iR').value, d = getD();
    if(!n || isNaN(a) || !db.c[n]) return msg("Check Client Details");
    const tx = { id: Date.now(), name: n, amount: a, date: d, type: curT, remarks: r };
    db.t.push(tx);
    db.o.push({ action: 'addTxn', txn: tx, customer: { name: n, ...db.c[n] } });
    saveL(); drawR(); updateS();
    document.getElementById('m-name').innerText = n;
    document.getElementById('m-amt').innerText = smartFmt(a);
    document.getElementById('modal-success').style.display = 'flex';
    document.getElementById('iN').value=''; document.getElementById('iA').value=''; document.getElementById('iR').value='';
    document.getElementById('iR').style.display='none'; document.getElementById('cust-bal-preview').style.display='none';
    syncOutbox();
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function handleBookSearch(q) {
    if (q.trim() !== "") {
        document.getElementById('customerListView').style.display = 'none';
        document.getElementById('cityListView').style.display = 'block';
    }
    drawBookList(q);
}

function drawBookList(q = '') {
    const l = document.getElementById('bookList'), query = q.toLowerCase();
    let cities = {}, globalCustomers = [];
    Object.keys(db.c).forEach(n => {
        const city = db.c[n].city || "Local";
        const bal = db.t.filter(t => t.name.toLowerCase() === n.toLowerCase()).reduce((s, t) => s + (t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0)), 0);
        if(!cities[city]) cities[city] = 0;
        cities[city] += Math.max(0, bal);
        if (query.length > 0 && n.toLowerCase().includes(query)) globalCustomers.push({ name: n, city: city, bal: bal });
    });
    
    let html = '';
    if (query.length > 0) {
        if (globalCustomers.length > 0) {
            html += `<div style="font-size:10px; font-weight:900; color:var(--acc); margin:10px 4px">RESULTS</div>`;
            globalCustomers.sort((a,b) => b.bal - a.bal).forEach(c => {
                html += `<div class="row-item" onclick="viewClientDirectly('${c.name.replace(/'/g,"\\'")}', '${c.city.replace(/'/g,"\\'")}')"><div><span class="row-name">${c.name}</span><div class="row-sub">${c.city}</div></div><b class="row-val" style="color:var(--${c.bal>=0?'red':'grn'})">${smartFmt(c.bal)}</b></div>`;
            });
        } else { html += '<div style="text-align:center; padding:40px; color:var(--mut)">No matches</div>'; }
    } else {
        Object.keys(cities).sort((a,b) => cities[b] - cities[a]).forEach(city => {
            html += `<div class="row-item" onclick="viewCityCustomers('${city.replace(/'/g,"\\'")}')"><div><span class="row-name" style="color:var(--acc)">${city}</span><div class="row-sub">City Total</div></div><span class="row-val">${shopFmt(cities[city])}</span></div>`;
        });
    }
    l.innerHTML = html;
}

function viewClientDirectly(name, city) { 
    document.getElementById('bookSearch').value = ''; 
    viewCityCustomers(city); 
    setTimeout(() => { toggleH(null, name); }, 150); 
}

function viewCityCustomers(city, q = '') {
    document.getElementById('cityListView').style.display = 'none';
    document.getElementById('customerListView').style.display = 'block';
    document.getElementById('selectedCityName').innerText = city;
    const query = q.toLowerCase(), l = document.getElementById('customerList');
    const customers = Object.keys(db.c).filter(n => db.c[n].city === city && n.toLowerCase().includes(query)).map(n => {
        const bal = db.t.filter(t => t.name.toLowerCase() === n.toLowerCase()).reduce((s, t) => s + (t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0)), 0);
        return { name: n, bal };
    }).sort((a,b) => b.bal - a.bal);
    l.innerHTML = customers.map(x => `
        <div class="card" style="padding: 14px; margin-bottom: 8px;" onclick="copyAndToggle(event, '${x.name.replace(/'/g,"\\'")}')">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><b style="text-transform:capitalize; font-size:13px; color:#fff">${x.name}</b><div style="font-size: 9px; color: var(--mut); margin-top: 4px;">Shared: ${db.c[x.name].lastShared || 'Never'}</div></div>
                <b style="color:var(--${x.bal>=0?'red':'grn'}); font-size:13px; font-family:monospace">${smartFmt(x.bal)}</b>
            </div>
            <div id="h-${x.name.replace(/\s/g,'_')}" style="display:none; margin-top:10px; padding-top:10px; border-top:1px dashed #2a2a3a"></div>
        </div>`).join('') || `<div style="text-align:center; padding:20px; color:var(--mut)">No clients</div>`;
}

function copyAndToggle(e, name) { shareLedger(name); toggleH(e, name); }
function backToCities() { document.getElementById('cityListView').style.display = 'block'; document.getElementById('customerListView').style.display = 'none'; document.getElementById('bookSearch').value = ''; drawBookList(); }

function toggleH(e, name) {
    const id = "h-" + name.replace(/\s/g,'_'), el = document.getElementById(id);
    if(el.style.display === 'block') { el.style.display = 'none'; return; }
    document.querySelectorAll('[id^="h-"]').forEach(p => p.style.display = 'none');
    const history = db.t.filter(t => t.name.toLowerCase() === name.toLowerCase() && t.type !== 'join').sort((a,b) => b.id - a.id).slice(0, 15);
    el.innerHTML = history.map(t => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1c1c28; font-size:11px" onclick="event.stopPropagation(); openEditModal(${t.id})"><span style="color:var(--mut)">${t.date.split('-').reverse().slice(0,2).join('/')} ${t.remarks||''}</span><b style="color:var(--${t.type==='bill'?'red':'grn'})">${smartFmt(t.amount)}</b></div>`).join('');
    el.style.display = 'block';
}

function shareLedger(name) {
    const txns = db.t.filter(t => t.name.toLowerCase() === name.toLowerCase()).sort((a,b) => a.id - b.id);
    if(txns.length === 0) return;
    let weeklyPayLine = "";
    const firstTxn = txns.find(t => t.type !== 'join');
    if (firstTxn) {
        const remVal = parseInt(firstTxn.remarks);
        if (!isNaN(remVal) && remVal >= 1 && remVal <= 100) {
            const finalBal = txns.reduce((s,t)=>s+(t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0)),0);
            const xAmount = (finalBal * remVal) / 100;
            if (xAmount > 0) weeklyPayLine = `*Please pay ${fmt(Math.round(xAmount))} this week*\n\n`;
        }
    }
    let startIndex = -1;
    for(let i = txns.length - 1; i >= 0; i--) { if(String(txns[i].remarks || '').includes('#')) { startIndex = i; break; } }
    let openingBal = 0, relevantTxns = [];
    const today = new Date(), cutoffDate = new Date(today.getTime() - (8 * 24 * 60 * 60 * 1000));
    txns.forEach((t, idx) => {
        const tDate = new Date(t.date);
        if (startIndex !== -1) {
            if (idx <= startIndex) openingBal += (t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0));
            else relevantTxns.push(t);
        } else {
            if (tDate < cutoffDate) openingBal += (t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0));
            else relevantTxns.push(t);
        }
    });
    let currentBal = openingBal;
    let body = weeklyPayLine + `Opening Balance: ${fmt(openingBal)}\n\n`;
    relevantTxns.forEach(t => {
        const dateStr = t.date.split('-').reverse().slice(0,2).join('/');
        body += `${dateStr} ${t.type === 'bill' ? 'Sale' : 'Cash'}: ${fmt(t.amount)} ${t.remarks || ''}\n`;
        currentBal += (t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0));
    });
    body += `\n*Final Balance: ${fmt(currentBal)}*`;
    const ta = document.createElement("textarea"); ta.value = body; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    msg("Copied to Clipboard!");
}

function drawSharedLog() {
    const list = document.getElementById('sharedLogList');
    list.innerHTML = Object.keys(db.c).sort().map(n => `<div class="row-item" style="padding: 10px 16px;"><div><b style="font-size:12px">${n}</b><div class="row-sub">${db.c[n].city}</div></div><span style="font-size:10px; color:var(--mut)">Shared: ${db.c[n].lastShared || 'Never'}</span></div>`).join('');
}

function markAllAsShared() {
    const today = getD();
    let updatedCount = 0;
    Object.keys(db.c).forEach(name => {
        const userTxns = db.t.filter(t => t.name.toLowerCase() === name.toLowerCase() && t.type !== 'join').sort((a,b) => b.id - a.id);
        if(userTxns.length > 0) {
            const latest = userTxns[0];
            if(!String(latest.remarks).includes('#')) { latest.remarks = (latest.remarks || '') + ' #'; db.o.push({ action: 'editTxn', txn: latest }); }
        }
        db.c[name].lastShared = today;
        updatedCount++;
    });
    saveL(); drawSharedLog(); syncOutbox(); msg(`Marked ${updatedCount} clients`);
}

function drawClientRegistry() {
    const r = document.getElementById('clientRegistry');
    r.innerHTML = Object.keys(db.c).sort().map(n => `<div class="row-item" onclick="editClientName('${n.replace(/'/g,"\\'")}')"><div><b style="font-size:13px">${n}</b><br><small style="color:var(--mut); font-size:10px">${db.c[n].city}</small></div><span style="font-size:11px; color:var(--acc); font-weight:800">EDIT</span></div>`).join('');
}

function editClientName(old) {
    const n = prompt("Change name for " + old, old);
    if (n && n !== old && !db.c[n]) {
        db.c[n] = db.c[old]; delete db.c[old];
        db.t.forEach(t => { if(t.name.toLowerCase() === old.toLowerCase()) t.name = n; });
        db.o.push({ action: 'editClient', oldName: old, newName: n });
        saveL(); drawClientRegistry(); syncOutbox();
    }
}

async function handleNewClient() {
    const n = document.getElementById('newCustName').value.trim(), c = document.getElementById('newCustCity').value.trim() || "Local";
    if(!n || db.c[n]) return msg("Enter Unique Name");
    db.c[n] = { joined: getD(), city: c, lastShared: 'Never' };
    db.o.push({ action: 'addTxn', txn: { id: Date.now(), name: n, amount: 0, date: getD(), type: 'join', remarks: '' }, customer: { name: n, city: c, lastShared: 'Never' } });
    saveL(); document.getElementById('newCustName').value=''; document.getElementById('newCustCity').value='';
    drawClientRegistry(); updateS(); syncOutbox(); msg("Client Registered!");
}

function updateS() {
    let due = 0;
    Object.keys(db.c).forEach(n => {
        const b = db.t.filter(t => t.name.toLowerCase() === n.toLowerCase()).reduce((s, t) => s + (t.type==='bill'?t.amount:(t.type==='pay'?-t.amount:0)), 0);
        if(b > 0) due += b;
    });
    document.getElementById('header-total').innerText = shopFmt(Math.round(due / 100000)) + " L";
}

function generateReport(type) {
    const targetDate = type === 'today' ? getD() : getD(-1);
    const dayTxns = db.t.filter(t => t.date === targetDate && t.type !== 'join');
    
    if(dayTxns.length === 0) return msg("No transactions for " + type);

    const canvas = document.getElementById('reportCanvas');
    const ctx = canvas.getContext('2d');
    
    const bills = dayTxns.filter(it => it.type === 'bill');
    const pays = dayTxns.filter(it => it.type === 'pay');
    const maxItems = Math.max(bills.length, pays.length);
    
    const margin = 40, headerH = 120, rowH = 65, footerH = 120;
    canvas.width = 1200; // Wider for side-by-side layout
    canvas.height = headerH + (maxItems * rowH) + footerH + 40;

    // BG
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Border
    ctx.strokeStyle = '#f0c040';
    ctx.lineWidth = 4;
    ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

    // Header
    ctx.fillStyle = '#f0c040';
    ctx.font = 'bold 42px sans-serif';
    ctx.fillText('LEDGER PRO', margin, 70);
    ctx.fillStyle = '#8080a0';
    ctx.font = '22px sans-serif';
    ctx.fillText('TRANSACTION SUMMARY REPORT', margin, 105);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#e8e8f0';
    ctx.fillText(targetDate.split('-').reverse().join('/'), canvas.width - margin, 70);
    ctx.textAlign = 'left';

    // Divider
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(margin, 130);
    ctx.lineTo(canvas.width - margin, 130);
    ctx.stroke();

    // Column Headers
    ctx.font = 'bold 20px sans-serif';
    ctx.fillStyle = '#ff4d4d';
    ctx.fillText('SALE (+)', margin + 10, 165);
    ctx.fillStyle = '#00e676';
    ctx.textAlign = 'right';
    ctx.fillText('CASH (-)', canvas.width - margin - 10, 165);
    ctx.textAlign = 'left';

    let y = 210;
    let totalSale = 0, totalPay = 0;

    for (let i = 0; i < maxItems; i++) {
        const b = bills[i], p = pays[i];

        // Draw Sale Box (Left)
        if (b) {
            totalSale += b.amount;
            ctx.fillStyle = '#1c1c28';
            ctx.fillRect(margin, y - 35, (canvas.width/2) - margin - 10, 55);
            ctx.strokeStyle = '#2a2a3a';
            ctx.strokeRect(margin, y - 35, (canvas.width/2) - margin - 10, 55);
            
            ctx.fillStyle = '#e8e8f0';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText(b.name.toUpperCase(), margin + 15, y - 12);
            ctx.font = '14px sans-serif';
            ctx.fillStyle = '#8080a0';
            ctx.fillText(b.remarks || '', margin + 15, y + 10);
            
            ctx.fillStyle = '#ff4d4d';
            ctx.font = 'bold 20px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(fmt(b.amount), (canvas.width/2) - 25, y);
            ctx.textAlign = 'left';
        }

        // Draw Cash Box (Right)
        if (p) {
            totalPay += p.amount;
            const startX = (canvas.width/2) + 10;
            ctx.fillStyle = '#1c1c28';
            ctx.fillRect(startX, y - 35, (canvas.width/2) - margin - 10, 55);
            ctx.strokeStyle = '#2a2a3a';
            ctx.strokeRect(startX, y - 35, (canvas.width/2) - margin - 10, 55);

            ctx.fillStyle = '#e8e8f0';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText(p.name.toUpperCase(), startX + 15, y - 12);
            ctx.font = '14px sans-serif';
            ctx.fillStyle = '#8080a0';
            ctx.fillText(p.remarks || '', startX + 15, y + 10);

            ctx.fillStyle = '#00e676';
            ctx.font = 'bold 20px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(fmt(p.amount), canvas.width - margin - 15, y);
            ctx.textAlign = 'left';
        }

        y += rowH;
    }

    // Footer
    const footerY = canvas.height - footerH + 20;
    ctx.strokeStyle = '#f0c040';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(margin, footerY - 20);
    ctx.lineTo(canvas.width - margin, footerY - 20);
    ctx.stroke();

    ctx.fillStyle = '#e8e8f0';
    ctx.font = '22px sans-serif';
    ctx.fillText('TOTAL SALES:', margin, footerY + 25);
    ctx.fillStyle = '#ff4d4d';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText(fmt(totalSale), margin + 180, footerY + 25);

    ctx.fillStyle = '#e8e8f0';
    ctx.font = '22px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('TOTAL CASH:', canvas.width - 280, footerY + 25);
    ctx.fillStyle = '#00e676';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText(fmt(totalPay), canvas.width - margin, footerY + 25);

    // Final Blob Download
    canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `LP_Report_${targetDate}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        msg("Report Saved!");
    }, 'image/png');
}

function msg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
function closeAllPanes(e) { if(!e.target.closest('.card') && !e.target.closest('.autocomplete') && !e.target.closest('.row-item') && !e.target.closest('.modal')) { document.querySelectorAll('[id^="h-"]').forEach(p=>p.style.display='none'); document.querySelectorAll('.autocomplete').forEach(a=>a.style.display='none'); } }

function initPTR() {
    let sY = 0;
    window.addEventListener('touchstart', (e) => { if(window.scrollY===0) sY=e.touches[0].pageY; }, {passive:true});
    window.addEventListener('touchend', async (e) => { if(sY && e.changedTouches[0].pageY-sY > 90) { await pull(); msg("Data Refreshed"); } sY=0; });
}
window.onload = init;
</script>
