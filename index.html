<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LedgerPro</title>
    <style>
        :root { --bg: #0a0a0f; --surf: #13131a; --bord: #2a2a3a; --acc: #f0c040; --red: #ff4d4d; --grn: #00e676; --txt: #e8e8f0; --mut: #8080a0; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); padding-bottom: 60px; font-size: 14px; overflow-x: hidden; }
        .nav { position: sticky; top: 0; z-index: 99; background: rgba(10,10,15,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid var(--bord); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; gap: 5px; }
        .tab { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; border:none; background:transparent; color: var(--mut); cursor: pointer; }
        .tab.active { background: var(--acc); color: #000; }
        .section { display: none; padding: 12px; }
        .section.active { display: block; }
        .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; padding: 12px; margin-bottom: 12px; position: relative; }
        .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .t-btn { padding: 10px; border-radius: 8px; border: 1px solid var(--bord); background: var(--surf); color: var(--mut); font-weight: 700; font-size: 12px; }
        .t-btn.active.r { background: var(--red); color: #fff; }
        .t-btn.active.g { background: var(--grn); color: #fff; }
        input { width: 100%; background: #1c1c28; border: 1px solid var(--bord); border-radius: 8px; padding: 10px; color: #fff; margin-bottom: 10px; font-size: 14px; outline: none; }
        .plus-btn { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--bord); font-weight: 800; cursor: pointer; margin-left: 10px; font-size: 16px; }
        .btn-sub { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 800; margin-top: 5px; cursor: pointer; }
        .txn-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a3a55; }
        .copy-btns { display: flex; gap: 4px; margin-top: 8px; }
        .c-btn { font-size: 10px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--bord); background: #1c1c28; color: var(--acc); font-weight: 700; }
        .edit-ic { color: var(--mut); padding: 5px; cursor: pointer; font-size: 12px; }
        .history-pane { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--bord); display: none; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-c { background: var(--surf); padding: 20px; border-radius: 15px; width: 100%; max-width: 320px; border: 1px solid var(--bord); }
        .toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--acc); color: #000; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 999; display: none; }
        .autocomplete { position: absolute; background: #1c1c28; border: 1px solid var(--acc); width: calc(100% - 24px); z-index: 100; border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .auto-item { padding: 10px; border-bottom: 1px solid var(--bord); }
    </style>
</head>
<body onclick="closeAllPanes(event)">
<div id="loader" style="position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;">Syncing...</div>
<nav class="nav"><div style="font-weight:800">Ledger<span style="color:var(--acc)">Pro</span></div><div class="nav-tabs"><button class="tab active" onclick="tab('home',this)">HOME</button><button class="tab" onclick="tab('books',this)">BOOKS</button></div></nav>
<div id="toast" class="toast"></div>

<!-- Home -->
<div id="sec-home" class="section active">
    <div class="type-toggle">
        <button class="t-btn" id="br" onclick="setT('bill')">SALE (+)</button>
        <button class="t-btn" id="bg" onclick="setT('pay')">PAY (-)</button>
    </div>
    <div id="form" class="card" style="display:none">
        <div style="display:flex;align-items:center;margin-bottom:10px;">
            <div style="flex:1"><input id="iN" placeholder="Name" oninput="autoC()" style="margin:0"></div>
            <div id="pBtn" class="plus-btn" onclick="tglR()">+</div>
        </div>
        <div id="auto" class="autocomplete" style="display:none"></div>
        <input id="iA" type="number" placeholder="Amount" inputmode="decimal">
        <input id="iR" placeholder="Remarks" style="display:none">
        <button id="sBtn" class="btn-sub" onclick="sub()">ADD</button>
    </div>
    <div id="list"></div>
</div>

<!-- Books -->
<div id="sec-books" class="section">
    <div class="card" style="display:flex;gap:10px;text-align:center">
        <div style="flex:1"><small>DUE</small><div id="tD" style="color:var(--red);font-weight:800">0</div></div>
        <div style="flex:1"><small>CLIENTS</small><div id="tC" style="font-weight:800">0</div></div>
    </div>
    <input placeholder="Search..." oninput="drawB(this.value)">
    <div id="bList"></div>
</div>

<!-- Edit Modal -->
<div id="modal"><div class="modal-c">
    <h4 style="margin-bottom:15px;color:var(--acc)">Edit Transaction</h4>
    <input id="eA" type="number" placeholder="Amount">
    <input id="eR" placeholder="Remarks">
    <div style="display:flex;gap:10px">
        <button onclick="closeM()" style="flex:1;padding:10px;border-radius:8px;background:var(--bord);color:#fff;border:none">Cancel</button>
        <button onclick="saveE()" style="flex:1;padding:10px;border-radius:8px;background:var(--acc);color:#000;border:none;font-weight:700">Save</button>
    </div>
</div></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNacQk_xa6ImnNCkcXjRmC_U8i5yYNMIn7rqyvJHHJmdWBR5TbvFXR1mjXGx9PFFp7/exec";
let db = JSON.parse(localStorage.getItem('lp_d') || '{"c":{},"t":[]}'), curT = '', editId = null;

// FIXED: Using India Standard Time (IST) instead of UTC
const getD = () => {
    const now = new Date();
    // Offset for IST (UTC + 5:30)
    const istOffset = 5.5 * 60 * 60 * 1000;
    const istTime = new Date(now.getTime() + istOffset);
    return istTime.toISOString().split('T')[0];
};

const saveL = () => localStorage.setItem('lp_d', JSON.stringify(db));

async function init() { drawR(); await pull(); document.getElementById('loader').style.display='none'; }

async function pull() {
    return new Promise(res => {
        const c = 'cb'+Date.now();
        window[c] = (d) => { 
            if(d.txns){ 
                // Normalize dates from cloud to ensure they don't have time components
                db.t = d.txns.map(t => ({...t, date: String(t.date).split('T')[0]}));
                db.c = d.customers;
                saveL(); drawR(); updateS(); 
            } 
            res(); 
        };
        const s = document.createElement('script'); s.src=`${SCRIPT_URL}?action=getData&callback=${c}`; document.body.appendChild(s);
    });
}

function tab(n,b) {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('sec-'+n).classList.add('active'); b.classList.add('active');
    if(n==='books') drawB();
}

function setT(t) {
    curT = t;
    document.getElementById('br').className = t==='bill' ? 't-btn active r' : 't-btn';
    document.getElementById('bg').className = t==='pay' ? 't-btn active g' : 't-btn';
    const p = document.getElementById('pBtn');
    p.style.color = p.style.borderColor = t==='bill' ? 'var(--red)' : 'var(--grn)';
    document.getElementById('form').style.display = 'block';
    const s = document.getElementById('sBtn');
    s.style.background = t==='bill' ? 'var(--red)' : 'var(--grn)';
    s.innerText = t==='bill' ? 'ADD BILL (+)' : 'ADD PAYMENT (-)';
}

function tglR() { const r = document.getElementById('iR'); r.style.display = r.style.display==='none'?'block':'none'; }

function autoC() {
    const v = document.getElementById('iN').value.toLowerCase(), a = document.getElementById('auto');
    if(!v){ a.style.display='none'; return; }
    const m = Object.keys(db.c).filter(n => n.toLowerCase().includes(v));
    a.innerHTML = m.map(n => `<div class="auto-item" onclick="sel('${n}')">${n}</div>`).join('');
    a.style.display = m.length ? 'block' : 'none';
}
function sel(n) { document.getElementById('iN').value=n; document.getElementById('auto').style.display='none'; }

async function sub() {
    const n = document.getElementById('iN').value.trim(), a = parseFloat(document.getElementById('iA').value), r = document.getElementById('iR').value, d = getD();
    if(!n || !a) return;
    const tx = { id:Date.now(), name:n, amount:a, date:d, type:curT, remarks:r };
    db.t.push(tx); if(!db.c[n]) db.c[n] = { joined:d };
    saveL(); drawR(); updateS();
    document.getElementById('iN').value=''; document.getElementById('iA').value=''; document.getElementById('iR').value='';
    msg("Saved");
    fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'addTxn', txn:tx, customer:{name:n, ...db.c[n]}})});
}

function drawR() {
    const l = document.getElementById('list'), s = [...db.t].sort((a,b)=>b.id-a.id).slice(0,30);
    l.innerHTML = s.map(t => {
        const cleanDate = String(t.date).split('T')[0].split('-').reverse().join('/');
        return `<div class="txn-item">
            <div style="flex:1"><b>${t.name}</b><br><small>${cleanDate} ${t.remarks?'• '+t.remarks:''}</small></div>
            <div style="display:flex;align-items:center;gap:12px">
                <b style="color:${t.type==='bill'?'var(--red)':'var(--grn)'}">₹${t.amount}</b>
                <span class="edit-ic" onclick="editT(${t.id})">✎</span>
            </div>
        </div>`
    }).join('');
}

function drawB(q='') {
    const l = document.getElementById('bList');
    const data = Object.keys(db.c).map(n => {
        const b = db.t.filter(t=>t.name===n).reduce((s,t)=>s+(t.type==='bill'?t.amount:-t.amount), 0);
        return { n, b };
    }).filter(x => x.n.toLowerCase().includes(q.toLowerCase())).sort((a,b)=>b.b - a.b);

    l.innerHTML = data.map(x => `
        <div class="card" onclick="toggleH(event, '${x.n}')">
            <div style="display:flex;justify-content:space-between"><b>${x.n}</b><b style="color:${x.b>0?'var(--red)':'var(--grn)'}">₹${x.b}</b></div>
            <div class="copy-btns">
                <button class="c-btn" onclick="copy(event, '${x.n}', 7, 'Week')">W</button>
                <button class="c-btn" onclick="copy(event, '${x.n}', 30, 'Month')">M</button>
                <button class="c-btn" onclick="copy(event, '${x.n}', 90, 'Quarter')">Q</button>
            </div>
            <div id="h-${x.n.replace(/\s/g,'_')}" class="history-pane"></div>
        </div>`).join('');
}

function toggleH(e, name) {
    if(e.target.tagName === 'BUTTON' || e.target.classList.contains('edit-ic')) return;
    const id = "h-"+name.replace(/\s/g,'_');
    const el = document.getElementById(id);
    const wasActive = el.style.display === 'block';
    
    document.querySelectorAll('.history-pane').forEach(p => p.style.display = 'none');
    
    if(!wasActive) {
        const hist = db.t.filter(t => t.name === name).sort((a,b) => b.id - a.id).slice(0,30);
        el.innerHTML = hist.map(t => {
            const cleanDate = String(t.date).split('T')[0].split('-').reverse().join('/');
            return `<div class="txn-item">
                <small>${cleanDate} ${t.type==='bill'?'(+)':'(-)'}</small>
                <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:12px;color:${t.type==='bill'?'var(--red)':'var(--grn)'}">₹${t.amount}</span>
                    <span class="edit-ic" onclick="editT(${t.id})">✎</span>
                </div>
            </div>`
        }).join('');
        el.style.display = 'block';
    }
}

function closeAllPanes(e) {
    if(!e.target.closest('.card')) document.querySelectorAll('.history-pane').forEach(p => p.style.display = 'none');
}

function editT(id) {
    const t = db.t.find(x => x.id === id); if(!t) return;
    editId = id;
    document.getElementById('eA').value = t.amount;
    document.getElementById('eR').value = t.remarks || '';
    document.getElementById('modal').style.display = 'flex';
}

function closeM() { document.getElementById('modal').style.display = 'none'; }

async function saveE() {
    const t = db.t.find(x => x.id === editId);
    t.amount = parseFloat(document.getElementById('eA').value);
    t.remarks = document.getElementById('eR').value;
    // Keep the original date on edit
    saveL(); drawR(); updateS(); if(document.getElementById('sec-books').classList.contains('active')) drawB();
    closeM(); msg("Updated");
    fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'addTxn', txn:t, customer:{name:t.name, ...db.c[t.name]}})});
}

function copy(e, name, days, label) {
    e.stopPropagation();
    const now = new Date();
    // Use IST for comparison
    const istOffset = 5.5 * 60 * 60 * 1000;
    const limitDate = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000) + istOffset);
    const limit = limitDate.toISOString().split('T')[0];

    const userTxns = db.t.filter(t => t.name === name).sort((a,b) => a.id - b.id);
    let op = 0, pL = [], cl = 0;
    userTxns.forEach(t => {
        const tDate = String(t.date).split('T')[0];
        if(tDate < limit) op += (t.type==='bill'?t.amount:-t.amount);
        else pL.push(t);
        cl += (t.type==='bill'?t.amount:-t.amount);
    });
    let s = `Report: ${name}\nOld Bal: ₹${op}\n`;
    pL.forEach(t => {
        const cleanDate = String(t.date).split('T')[0].split('-').reverse().slice(0,2).join('/');
        s += `${cleanDate} ${t.type==='bill'?'Bill':'Pay'} (₹${t.amount})\n`;
    });
    s += `Final Bal: ₹${cl}`;
    const el = document.createElement('textarea'); el.value = s; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    msg("Copied!");
}

function updateS() {
    let d=0; Object.keys(db.c).forEach(n=>{ const b=db.t.filter(t=>t.name===n).reduce((s,t)=>s+(t.type==='bill'?t.amount:-t.amount),0); if(b>0) d+=b; });
    document.getElementById('tD').innerText = '₹'+Math.round(d); document.getElementById('tC').innerText = Object.keys(db.c).length;
}

function msg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
window.onload = init;
</script>
</body>
</html>
