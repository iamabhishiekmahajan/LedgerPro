<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LedgerPro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #0a0a0f; --surf: #13131a; --bord: #2a2a3a; --acc: #f0c040; --red: #ff4d4d; --grn: #00e676; --txt: #e8e8f0; --mut: #8080a0; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); padding-bottom: 60px; font-size: 14px; overflow-x: hidden; touch-action: pan-y; }
        
        #ptr { text-align: center; height: 0; overflow: hidden; transition: height 0.2s; color: var(--acc); font-size: 12px; display: flex; align-items: center; justify-content: center; background: var(--surf); border-bottom: 1px solid var(--bord); }
        
        .nav { position: sticky; top: 0; z-index: 99; background: rgba(10,10,15,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid var(--bord); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; gap: 5px; }
        .tab { padding: 8px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; border:none; background:transparent; color: var(--mut); cursor: pointer; }
        .tab.active { background: var(--acc); color: #000; }
        
        .section { display: none; padding: 12px; min-height: 80vh; }
        .section.active { display: block; }
        
        .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; }
        .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .t-btn { padding: 12px; border-radius: 8px; border: 1px solid var(--bord); background: var(--surf); color: var(--mut); font-weight: 700; font-size: 12px; cursor: pointer; }
        .t-btn.active.r { background: var(--red); color: #fff; border-color: var(--red); }
        .t-btn.active.g { background: var(--grn); color: #fff; border-color: var(--grn); }
        
        input { width: 100%; background: #1c1c28; border: 1px solid var(--bord); border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 10px; font-size: 14px; outline: none; }
        .btn-sub { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 800; margin-top: 5px; cursor: pointer; transition: 0.2s; }
        
        .txn-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2a2a3a55; }
        .edit-ico { font-size: 12px; margin-left: 8px; opacity: 0.6; cursor: pointer; padding: 4px; }
        
        .date-group { background: #1c1c28; padding: 5px 10px; font-size: 10px; font-weight: 800; color: var(--mut); border-radius: 4px; margin: 15px 0 8px 0; text-transform: uppercase; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; }
        .modal-content { background: var(--surf); border: 1px solid var(--bord); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; }

        .history-pane { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--bord); }
        .copy-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        .copy-btn { padding: 8px 4px; background: #1c1c28; color: var(--acc); border: 1px solid var(--bord); border-radius: 6px; font-size: 9px; font-weight: 700; cursor: pointer; }

        .run-bal { font-size: 10px; font-weight: 500; display: block; margin-top: 2px; }

        #summary-capture { position: absolute; left: -9999px; top: 0; width: 500px; background: #0a0a0f; color: white; padding: 30px; border: 4px solid var(--acc); }
        .summary-header { text-align: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .summary-col { background: #13131a; border: 1px solid #2a2a3a; padding: 15px; border-radius: 12px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #ffffff11; padding-bottom: 4px; }
        .summary-total { margin-top: 10px; padding-top: 5px; border-top: 1px solid var(--bord); font-weight: 800; display: flex; justify-content: space-between; font-size: 14px; }

        .autocomplete { position: absolute; background: #1c1c28; border: 1px solid var(--acc); width: 100%; z-index: 100; border-radius: 8px; max-height: 150px; overflow-y: auto; top: 50px; }
        .auto-item { padding: 12px; border-bottom: 1px solid var(--bord); color: var(--txt); }
        
        .btn-opt { background: #1c1c28; border: 1px solid var(--bord); color: #fff; padding: 14px; border-radius: 10px; width: 100%; text-align: left; margin-bottom: 10px; font-weight: 600; cursor: pointer; }
        .toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--acc); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 9999; display: none; }
        
        .sync-indicator { position: fixed; bottom: 10px; right: 10px; width: 8px; height: 8px; border-radius: 50%; background: #444; transition: 0.3s; z-index: 100; }
        .sync-indicator.syncing { background: var(--acc); box-shadow: 0 0 10px var(--acc); }
        .sync-indicator.success { background: var(--grn); }
    </style>
</head>
<body onclick="closeAllPanes(event)">

<div id="ptr">Pull down to Sync...</div>
<div id="sync-indicator" class="sync-indicator"></div>

<div id="summary-capture">
    <div class="summary-header">
        <h2 style="color: var(--acc); margin:0">Daily Business Summary</h2>
        <div id="summary-date-label" style="font-size: 14px; color: #888; margin-top: 5px;"></div>
    </div>
    <div class="summary-grid">
        <div class="summary-col">
            <h4 style="color:var(--red); border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:10px;">BILLS (SALE)</h4>
            <div id="cap-sale-list"></div>
            <div class="summary-total" style="color:var(--red)">Total: <span id="cap-sale-total">0</span></div>
        </div>
        <div class="summary-col">
            <h4 style="color:var(--grn); border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:10px;">CASH (PAYMENT)</h4>
            <div id="cap-pay-list"></div>
            <div class="summary-total" style="color:var(--grn)">Total: <span id="cap-pay-total">0</span></div>
        </div>
    </div>
</div>

<div id="report-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; font-size:16px; color: var(--acc)">Save Daily Report</h3>
        <button class="btn-opt" onclick="generateSpecificReport(0)">📅 Today</button>
        <button class="btn-opt" onclick="generateSpecificReport(1)">📅 Yesterday</button>
        <button class="btn-sub" style="background:transparent; color:var(--mut); margin-top:10px;" onclick="closeReportModal()">CLOSE</button>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; font-size:16px;">Edit Transaction</h3>
        <input id="editA" type="number" placeholder="Amount (₹)">
        <input id="editR" placeholder="Remarks">
        <input id="editD" type="date">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn-sub" style="background:var(--acc); color:#000; flex:2" onclick="saveEdit()">UPDATE</button>
            <button class="btn-sub" style="background:var(--red); color:#fff; flex:1" onclick="deleteTxn()">DEL</button>
        </div>
        <button class="btn-sub" style="background:transparent; color:var(--mut); margin-top:10px;" onclick="closeModal()">CANCEL</button>
    </div>
</div>

<nav class="nav">
    <div style="font-weight:800">Ledger<span style="color:var(--acc)">Pro</span></div>
    <div class="nav-tabs">
        <button class="tab active" onclick="tab('home',this)">HOME</button>
        <button class="tab" onclick="tab('books',this)">BOOKS</button>
        <button class="tab" onclick="tab('add',this)">+ CLIENT</button>
        <button onclick="openReportModal()" style="background:none; border:none; color:var(--acc); font-size:22px; margin-left:10px; cursor:pointer;">🖼️</button>
    </div>
</nav>

<div id="toast" class="toast"></div>

<div id="sec-home" class="section active">
    <div class="type-toggle">
        <button class="t-btn" id="br" onclick="setT('bill')">SALE (+)</button>
        <button class="t-btn" id="bg" onclick="setT('pay')">PAYMENT (-)</button>
    </div>
    <div id="form-card" class="card" style="display:none">
        <div style="position:relative; margin-bottom:10px;">
            <input id="iN" placeholder="Customer Name" oninput="autoC('iN', 'auto')" autocomplete="off" style="margin:0">
            <div id="auto" class="autocomplete" style="display:none"></div>
        </div>
        <input id="iA" type="number" placeholder="Amount (₹)" inputmode="decimal">
        <input id="iR" placeholder="Details (Remarks)">
        <button id="sBtn" class="btn-sub" onclick="sub()">ADD ENTRY</button>
    </div>
    <div id="list"></div>
</div>

<div id="sec-books" class="section">
    <div class="card" style="display:flex; gap:10px; text-align:center">
        <div style="flex:1"><small style="color:var(--mut)">DUE</small><div id="tD" style="color:var(--red); font-weight:800">₹0</div></div>
        <div style="flex:1"><small style="color:var(--mut)">CLIENTS</small><div id="tC" style="font-weight:800">0</div></div>
    </div>
    <input placeholder="Search clients..." oninput="drawB(this.value)">
    <div id="bList"></div>
</div>

<div id="sec-add" class="section">
    <div class="card">
        <h3 style="color:var(--acc); margin-bottom:15px; font-size:14px;">Add New Client</h3>
        <input id="newCustName" placeholder="Full Name">
        <input id="newCustCity" placeholder="City (Default: Local)">
        <button class="btn-sub" style="background:var(--acc); color:#000;" onclick="handleNewClient()">REGISTER</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEVUXPtb58BxN4rL0cK0lmUDym4xEVckx4uRo6gRt-VjJypqi3l35uqs79f0dNvA7c/exec";
let db = JSON.parse(localStorage.getItem('lp_d') || '{"c":{},"t":[],"p":[]}'), curT = '', editingId = null;

const getD = (offset = 0) => {
    const d = new Date(new Date().getTime() + (5.5 * 3600000) - (offset * 86400000));
    return d.toISOString().split('T')[0];
};

const saveL = () => localStorage.setItem('lp_d', JSON.stringify(db));

// INITIALIZATION
function init() {
    // 1. Immediate UI Render from Local Data
    drawR(); 
    updateS();
    
    // 2. Automatic Silent Sync for GitHub Pages launch
    autoSync();
    
    // 3. Setup Pull-to-refresh
    initPTR();
}

async function autoSync() {
    const indicator = document.getElementById('sync-indicator');
    indicator.classList.add('syncing');
    
    try {
        await pull();
        indicator.classList.remove('syncing');
        indicator.classList.add('success');
        setTimeout(() => indicator.classList.remove('success'), 2000);
    } catch (e) {
        indicator.classList.remove('syncing');
    }
}

async function pull() {
    return new Promise((res, rej) => {
        const c = 'cb'+Date.now();
        const timeout = setTimeout(() => rej('timeout'), 10000);
        
        window[c] = (d) => {
            clearTimeout(timeout);
            if(d.txns) {
                db.t = d.txns.map(t => ({...t, date: String(t.date).split('T')[0], synced: true}));
                db.c = d.customers || {};
                saveL(); 
                drawR(); 
                updateS();
                if(document.getElementById('sec-books').classList.contains('active')) drawB();
            }
            res();
        };
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=getData&callback=${c}`;
        s.onerror = () => { clearTimeout(timeout); rej(); };
        document.body.appendChild(s);
    });
}

function tab(n, b) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('sec-' + n).classList.add('active');
    if(b) b.classList.add('active');
    if(n === 'books') drawB();
}

function setT(t) {
    curT = t;
    document.getElementById('br').className = t === 'bill' ? 't-btn active r' : 't-btn';
    document.getElementById('bg').className = t === 'pay' ? 't-btn active g' : 't-btn';
    document.getElementById('form-card').style.display = 'block';
    const s = document.getElementById('sBtn');
    s.style.background = t === 'bill' ? 'var(--red)' : 'var(--grn)';
    s.innerText = t === 'bill' ? 'ADD BILL (+)' : 'ADD PAYMENT RECEIVED';
}

function openReportModal() {
    document.getElementById('report-modal').style.display = 'flex';
}
function closeReportModal() { document.getElementById('report-modal').style.display = 'none'; }

function generateSpecificReport(offset) {
    const targetDate = getD(offset);
    const dayBills = db.t.filter(t => t.date === targetDate && t.type === 'bill');
    const dayPays = db.t.filter(t => t.date === targetDate && t.type === 'pay');
    
    document.getElementById('summary-date-label').innerText = targetDate.split('-').reverse().join('/');
    
    let saleHtml = '', saleTotal = 0;
    dayBills.forEach(b => { saleHtml += `<div class="summary-item"><span>${b.name}</span><span>₹${b.amount}</span></div>`; saleTotal += b.amount; });
    document.getElementById('cap-sale-list').innerHTML = saleHtml || '<div style="color:#444; text-align:center; padding:10px">No Sales</div>';
    document.getElementById('cap-sale-total').innerText = saleTotal;

    let payHtml = '', payTotal = 0;
    dayPays.forEach(p => { payHtml += `<div class="summary-item"><span>${p.name}</span><span>₹${p.amount}</span></div>`; payTotal += p.amount; });
    document.getElementById('cap-pay-list').innerHTML = payHtml || '<div style="color:#444; text-align:center; padding:10px">No Payments</div>';
    document.getElementById('cap-pay-total').innerText = payTotal;

    closeReportModal();
    msg("Generating Image...");
    html2canvas(document.getElementById('summary-capture')).then(canvas => {
        const link = document.createElement('a');
        link.download = `Report_${targetDate}.png`;
        link.href = canvas.toDataURL();
        link.click();
        msg("Report Saved!");
    });
}

function openEdit(id) {
    editingId = id;
    const t = db.t.find(x => x.id === id);
    if(!t) return;
    document.getElementById('editA').value = t.amount;
    document.getElementById('editR').value = t.remarks || '';
    document.getElementById('editD').value = t.date;
    document.getElementById('edit-modal').style.display = 'flex';
}
function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

async function saveEdit() {
    const idx = db.t.findIndex(x => x.id === editingId);
    if(idx === -1) return;
    db.t[idx].amount = parseFloat(document.getElementById('editA').value);
    db.t[idx].remarks = document.getElementById('editR').value;
    db.t[idx].date = document.getElementById('editD').value;
    db.t[idx].synced = false;
    saveL(); drawR(); updateS(); closeModal();
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'editTxn', txn: db.t[idx] }) }).then(() => autoSync());
}

async function deleteTxn() {
    const idx = db.t.findIndex(x => x.id === editingId);
    if(idx === -1) return;
    const delId = db.t[idx].id;
    db.t.splice(idx, 1);
    saveL(); drawR(); updateS(); closeModal();
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteTxn', id: delId }) }).then(() => autoSync());
}

function drawR() {
    const l = document.getElementById('list'), today = getD(), s = [...db.t].filter(t => t.type !== 'join').sort((a,b) => b.id - a.id).slice(0, 40);
    let html = '', lastD = '';
    s.forEach(t => {
        const d = String(t.date).split('T')[0];
        if(d !== lastD) { html += `<div class="date-group">${d === today ? "Today" : d.split('-').reverse().join('/')}</div>`; lastD = d; }
        html += `<div class="txn-item">
            <div><b>${t.name}</b> ${t.synced ? '✅' : '⚠️'}<br><small style="color:var(--mut)">${t.remarks||''}</small></div>
            <div style="display:flex; align-items:center; font-weight:800; color:${t.type==='bill'?'var(--red)':'var(--grn)'}">
                ₹${t.amount} <span class="edit-ico" onclick="openEdit(${t.id})">📝</span>
            </div>
        </div>`;
    });
    l.innerHTML = html || '<div style="text-align:center; padding:40px; color:var(--mut)">No transactions yet.</div>';
}

function autoC(inId, auId) {
    const v = document.getElementById(inId).value.toLowerCase(), a = document.getElementById(auId);
    if(!v) { a.style.display='none'; return; }
    const m = Object.keys(db.c).filter(n => n.toLowerCase().includes(v));
    a.innerHTML = m.map(n => `<div class="auto-item" onclick="sel('${n.replace(/'/g,"\\'")}','${inId}','${auId}')">${n} <small>(${db.c[n].city})</small></div>`).join('');
    a.style.display = m.length ? 'block' : 'none';
}
function sel(n, inId, auId) { document.getElementById(inId).value = n; document.getElementById(auId).style.display = 'none'; }

async function sub() {
    const n = document.getElementById('iN').value.trim(), a = parseFloat(document.getElementById('iA').value), r = document.getElementById('iR').value, d = getD();
    if(!n || !a || !db.c[n]) return msg("Select Customer");
    const tx = { id: Date.now(), name: n, amount: a, date: d, type: curT, remarks: r, synced: false };
    db.t.push(tx); saveL(); drawR(); updateS();
    document.getElementById('iN').value=''; document.getElementById('iA').value=''; document.getElementById('iR').value='';
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addTxn', txn: tx, customer: { name: n, ...db.c[n] } })}).then(() => autoSync());
}

async function handleNewClient() {
    const n = document.getElementById('newCustName').value.trim(), c = document.getElementById('newCustCity').value.trim() || "Local", d = getD();
    if(!n || db.c[n]) return msg("Client Exists");
    db.c[n] = { joined: d, city: c }; saveL(); updateS();
    tab('home', document.querySelectorAll('.tab')[0]);
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addTxn', txn: { id: Date.now(), name: n, amount: 0, date: d, type: 'join', remarks: '' }, customer: { name: n, city: c, joined: d } })}).then(() => autoSync());
}

function drawB(q = '') {
    const l = document.getElementById('bList'), query = q.toLowerCase();
    let cities = {};
    Object.keys(db.c).forEach(n => {
        const city = db.c[n].city || "Local", bal = db.t.filter(t => t.name === n).reduce((s, t) => s + (t.type==='bill' ? t.amount : (t.type==='pay' ? -t.amount : 0)), 0);
        if(n.toLowerCase().includes(query) || city.toLowerCase().includes(query)) {
            if(!cities[city]) cities[city] = { total: 0, items: [] };
            cities[city].items.push({ name: n, bal });
            cities[city].total += bal;
        }
    });
    let html = '';
    Object.keys(cities).sort((a,b) => cities[b].total - cities[a].total).forEach(cName => {
        html += `<div style="color:var(--acc); font-size:10px; margin:10px 0; border-bottom:1px solid var(--bord)">${cName.toUpperCase()}</div>`;
        cities[cName].items.sort((a,b) => b.bal - a.bal).forEach(x => {
            const displayBal = Math.round(Math.abs(x.bal));
            html += `<div class="card" onclick="toggleH(event, '${x.name.replace(/'/g,"\\'")}')">
                <div style="display:flex; justify-content:space-between">
                    <b>${x.name}</b>
                    <b style="color:${x.bal >= 0 ? 'var(--red)' : 'var(--grn)'}">₹${displayBal} ${x.bal >= 0 ? '(Dr)' : '(Cr)'}</b>
                </div>
                <div id="h-${x.name.replace(/\s/g,'_')}" class="history-pane" onclick="event.stopPropagation()"></div>
            </div>`;
        });
    });
    l.innerHTML = html;
}

function toggleH(e, name) {
    const id = "h-" + name.replace(/\s/g,'_'), el = document.getElementById(id);
    if(el.style.display === 'block') { el.style.display = 'none'; return; }
    document.querySelectorAll('.history-pane').forEach(p => p.style.display = 'none');
    
    const allTxns = db.t.filter(t => t.name === name && t.type !== 'join').sort((a,b) => a.id - b.id);
    let running = 0;
    const historyData = allTxns.map(t => {
        running += (t.type === 'bill' ? t.amount : -t.amount);
        return { ...t, runningBal: running };
    });

    const displayTxns = historyData.reverse().slice(0, 15);

    el.innerHTML = displayTxns.map(t => {
        const d = String(t.date).split('T')[0].split('-').reverse().join('/');
        const color = t.type === 'bill' ? 'var(--red)' : 'var(--grn)';
        const runColor = t.runningBal >= 0 ? 'var(--red)' : 'var(--grn)';
        return `<div class="txn-item" style="font-size:11px; align-items: flex-start;">
            <div style="flex:1"><small style="color:var(--mut)">${d}</small><br><span>${t.remarks || (t.type === 'bill' ? 'Sale' : 'Payment')}</span></div>
            <div style="text-align:right; margin-right: 5px;"><b style="color:${color}">${t.type === 'bill' ? '+' : '-'}₹${t.amount}</b><span class="run-bal" style="color:${runColor}">Bal: ₹${Math.round(Math.abs(t.runningBal))}</span></div>
            <span class="edit-ico" onclick="openEdit(${t.id})">📝</span>
        </div>`;
    }).join('') + `
    <div class="copy-group">
        <button class="copy-btn" onclick="copyPeriod('${name.replace(/'/g,"\\'")}', 30, 'Monthly')">COPY MONTHLY</button>
    </div>`;
    el.style.display = 'block';
}

function copyPeriod(name, days, label) {
    const txns = db.t.filter(t => t.name === name && t.type !== 'join');
    const totalBal = txns.reduce((s, t) => s + (t.type==='bill' ? t.amount : (t.type==='pay' ? -t.amount : 0)), 0);
    const txt = `📋 *Summary: ${name}*\n🚩 *Balance Due: ₹${Math.round(totalBal)}*\n_Generated via LedgerPro_`;
    const ta = document.createElement("textarea"); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    msg(`Summary Copied!`);
}

function updateS() {
    let due = 0;
    Object.keys(db.c).forEach(n => {
        const b = db.t.filter(t => t.name === n).reduce((s, t) => s + (t.type==='bill' ? t.amount : (t.type==='pay' ? -t.amount : 0)), 0);
        if(b > 0) due += b;
    });
    document.getElementById('tD').innerText = '₹' + Math.round(due);
    document.getElementById('tC').innerText = Object.keys(db.c).length;
}

function msg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

function initPTR() {
    let sY = 0, dist = 0; const ptr = document.getElementById('ptr');
    window.addEventListener('touchstart', (e) => { if (window.scrollY === 0) sY = e.touches[0].pageY; }, {passive: true});
    window.addEventListener('touchmove', (e) => {
        if (sY === 0 || window.scrollY > 0) return;
        dist = e.touches[0].pageY - sY;
        if (dist > 0 && dist < 120) { ptr.style.height = dist + 'px'; ptr.innerText = dist > 70 ? 'Release to Sync... 🔄' : 'Pull down to Sync...'; }
    }, {passive: true});
    window.addEventListener('touchend', async () => {
        if (dist > 70) { ptr.innerText = 'Syncing...'; ptr.style.height = '40px'; await autoSync(); msg("Cloud Synced!"); }
        ptr.style.height = '0'; sY = 0; dist = 0;
    });
}

function closeAllPanes(e) { if(!e.target.closest('.card') && !e.target.closest('.modal-content')) document.querySelectorAll('.history-pane').forEach(p => p.style.display = 'none'); }
window.onload = init;
</script>
</body>
</html>
